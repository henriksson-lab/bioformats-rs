# VolocityLibraryReader has no dedicated Java counterpart (Java's VolocityReader
# handles both the library and standalone variants), and mapping it here would
# consume the Java class and leave Rust's VolocityReader unmatched — so it is
# left to the matcher's "no counterpart" outcome.

