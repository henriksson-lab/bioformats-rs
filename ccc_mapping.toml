# ccc_mapping.toml — mapping between Rust bioformats-rs and upstream Java Bio-Formats.
#
# Used by: ccc-rs compare / missing / constants-diff / order-annotate.
# Rust = this crate's symbol, other = the Java class/method name.
#
# ccc-rs already folds snake_case ↔ camelCase and strips trivial suffixes, so only
# non-trivial mismatches are listed here. Matches it would already make on its own
# (e.g. AviReader ↔ AVIReader, open_bytes ↔ openBytes) are intentionally omitted.

# ─── Core API traits / classes ────────────────────────────────────────────────

[[entries]]
rust  = "FormatReader"
other = "IFormatReader"

[[entries]]
rust  = "FormatWriter"
other = "IFormatWriter"

[[entries]]
rust  = "ImageMetadata"
other = "CoreMetadata"

[[entries]]
rust  = "BioFormatsError"
other = "FormatException"

[[entries]]
rust  = "CachedReader"
other = "ReaderWrapper"

# ─── Zeiss-family readers (Rust drops the "Zeiss" prefix) ─────────────────────

[[entries]]
rust  = "LsmReader"
other = "ZeissLSMReader"

[[entries]]
rust  = "CziReader"
other = "ZeissCZIReader"

[[entries]]
rust  = "ZviReader"
other = "ZeissZVIReader"

[[entries]]
rust  = "XrmReader"
other = "ZeissXRMReader"

# ─── Olympus / Leica / Nikon renames ──────────────────────────────────────────

[[entries]]
rust  = "OifReader"
other = "FV1000Reader"

[[entries]]
rust  = "LeicaTcsReader"
other = "TCSReader"

[[entries]]
rust  = "LeicaLofReader"
other = "LOFReader"

[[entries]]
rust  = "NikonNisReader"
other = "NikonReader"

# ─── Gatan / Bruker / Photoshop ───────────────────────────────────────────────

