# ─── Method-level pins for the most heavily-overloaded API methods ────────────
#
# Every reader defines openBytes/setId/isThisType/initFile/close/getOptimalTile*,
# so a bare-name match would be ambiguous across ~180 readers. Pin the ones where
# the class itself was renamed above; for classes whose names already match
# (AviReader ↔ AVIReader etc.) ccc-rs's fingerprint/name matcher handles the
# methods without help. "open_bytes" is the primary hot-path method and the one
# most worth comparing, so we pin it per renamed class.

[[entries]]
rust        = "open_bytes"
rust_class  = "LsmReader"
other       = "openBytes"
other_class = "ZeissLSMReader"

[[entries]]
rust        = "open_bytes"
rust_class  = "CziReader"
other       = "openBytes"
other_class = "ZeissCZIReader"

